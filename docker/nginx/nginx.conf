# 팡슐랭 운영용 Nginx 메인 설정
# - 라우팅/헤더는 conf.d/default.conf 참고

user nginx;
worker_processes auto;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
  multi_accept on;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # 로깅 (CloudWatch 수집 시 docker logs 통해 가져감)
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for" '
                  'rt=$request_time uct="$upstream_connect_time" '
                  'uht="$upstream_header_time" urt="$upstream_response_time"';
  access_log /var/log/nginx/access.log main;
  error_log /var/log/nginx/error.log warn;

  # 성능
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  keepalive_requests 1000;
  types_hash_max_size 2048;
  server_tokens off;

  # gzip 압축 (CloudFront 도 압축하지만 origin 에서도 적용해 트래픽/비용 절감)
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml+rss
    application/wasm
    image/svg+xml;

  # 업로드 (이미지 최대 5MB, 여유 두고 10M)
  client_max_body_size 10M;
  client_body_buffer_size 128k;

  # 업스트림 정의 (compose 의 service 이름으로 DNS 해석)
  upstream pangchelin_web {
    server web:3000;
    keepalive 32;
  }

  upstream pangchelin_api {
    server api:4000;
    keepalive 32;
  }

  include /etc/nginx/conf.d/*.conf;
}
