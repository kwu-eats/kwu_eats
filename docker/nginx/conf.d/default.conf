# 팡슐랭 사이트 라우팅
#
# 기본 동작 (CloudFront 가 SSL 종단하는 시나리오):
#   - 80 으로만 트래픽 받음 (CloudFront → EC2 origin 은 HTTP)
#   - CloudFront 가 발급한 ACM 인증서로 외부 사용자에게 HTTPS 제공
#
# 직접 SSL 시나리오 (CloudFront 미사용):
#   - 아래 server { listen 443 ... } 블록 주석 해제
#   - certbot 으로 인증서 발급 후 경로 확인:
#       /etc/letsencrypt/live/<도메인>/fullchain.pem
#       /etc/letsencrypt/live/<도메인>/privkey.pem
#   - 80 → 443 리다이렉트도 활성화

# ──────────────────────────────────────────────────────────
# HTTP (80)
# ──────────────────────────────────────────────────────────
server {
  listen 80 default_server;
  server_name _;

  # CloudFront 신뢰 헤더 (X-Forwarded-Proto 가 https 라면 그대로 통과)
  # ALB/CloudFront 뒤에 있으니 real_ip 대신 X-Forwarded-For 만 활용

  # Let's Encrypt 도전 응답 (직접 SSL 시 사용)
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  # ── DGX 전용: 업로드 이미지 (/uploads/* → minio:9000)
  # AWS 운영에서는 이 경로로 트래픽이 들어오지 않음 (이미지 URL 이 S3 절대 URL).
  # 변수+resolver 로 lazy DNS 해석하여 minio 컨테이너가 없는 환경에서도 nginx 시작 가능.
  location /uploads/ {
    set $minio_upstream "http://minio:9000";
    rewrite ^/uploads/?(.*)$ /pangchelin/$1 break;

    proxy_pass $minio_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Connection "";

    # MinIO 응답에서 불필요한 헤더 제거
    proxy_hide_header x-amz-id-2;
    proxy_hide_header x-amz-request-id;
    proxy_hide_header x-amz-meta-server-side-encryption;
    proxy_hide_header x-amz-server-side-encryption;

    # 업로드 키가 UUID 라 immutable. 1년 캐시.
    add_header Cache-Control "public, max-age=31536000, immutable" always;

    # /uploads/ 자체로 접근 시 디렉토리 listing 노출 방지
    proxy_intercept_errors on;
    error_page 403 404 = @upload_not_found;
  }

  location @upload_not_found {
    return 404 "Not Found";
  }

  # ── API 프록시 (/api/* → api:4000/*)
  # NestJS 가 root 에 라우트를 등록 (/restaurants, /auth/login 등) 하므로
  # /api 접두사는 nginx 에서 strip.
  location /api/ {
    rewrite ^/api/?(.*)$ /$1 break;

    proxy_pass http://pangchelin_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    # API 응답은 캐시하지 않음
    add_header Cache-Control "no-store" always;
  }

  # ── Next.js 정적 자산 (1년 immutable 캐시)
  # /_next/static/* 는 빌드 해시 포함이라 안전하게 영구 캐시
  location /_next/static/ {
    proxy_pass http://pangchelin_web;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Connection "";

    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  # ── public 정적 자산 (favicon, robots.txt 등)
  location ~ ^/(favicon\.ico|robots\.txt|sitemap\.xml|manifest\.json)$ {
    proxy_pass http://pangchelin_web;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Connection "";

    add_header Cache-Control "public, max-age=86400" always;
  }

  # ── Web (Next.js) - 그 외 모든 경로
  location / {
    proxy_pass http://pangchelin_web;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
  }
}

