# Dependabot: 의존성 업데이트 PR 자동 생성
# - npm: 매주 월요일, 메이저 업데이트는 무시 (수동 검토)
# - github-actions: 매주, 액션 버전 핀 자동 갱신
# - docker: 매주, base image 보안 패치

version: 2
updates:
  # pnpm 워크스페이스 루트
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "10:00"
      timezone: Asia/Seoul
    open-pull-requests-limit: 5
    labels:
      - dependencies
    ignore:
      # 메이저 업데이트는 수동 검토
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # apps/api
  - package-ecosystem: npm
    directory: /apps/api
    schedule:
      interval: weekly
      day: monday
      time: "10:00"
      timezone: Asia/Seoul
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - api
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # apps/web
  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: weekly
      day: monday
      time: "10:00"
      timezone: Asia/Seoul
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - web
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
      # Next 메이저는 마이그레이션 가이드 수반되어 별도 작업
      - dependency-name: "next"
        update-types: ["version-update:semver-minor"]

  # GitHub Actions 자체
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - github-actions

  # Dockerfile base image
  - package-ecosystem: docker
    directory: /apps/api
    schedule:
      interval: weekly
    labels:
      - dependencies
      - docker

  - package-ecosystem: docker
    directory: /apps/web
    schedule:
      interval: weekly
    labels:
      - dependencies
      - docker
