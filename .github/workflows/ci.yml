name: CI

# Medium 스코프: lint + build + Docker 이미지 빌드까지 검증.
# 배포(ECR push, EC2 deploy)는 Step 5-3 후속 작업으로 분리.
#
# 트리거:
#   - main 으로 들어오는 PR
#   - main 직접 푸시 (긴급 핫픽스 등)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# 같은 브랜치에서 새 푸시가 오면 진행 중인 워크플로 취소 (자원 절약)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: 10
  NODE_VERSION: 20

jobs:
  # ────────────────────────────────────────────────────────────
  # 1) Lint: api / web 동시 실행 (의존성 캐시 공유)
  # ────────────────────────────────────────────────────────────
  lint:
    name: Lint (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [api, web]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client (api 전용)
        if: matrix.app == 'api'
        run: pnpm --filter api exec prisma generate

      - name: Lint
        run: pnpm --filter ${{ matrix.app }} lint

  # ────────────────────────────────────────────────────────────
  # 2) Build / Type-check: 컴파일 통과 확인
  # ────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [api, web]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client (api 전용)
        if: matrix.app == 'api'
        run: pnpm --filter api exec prisma generate

      - name: Build
        run: pnpm --filter ${{ matrix.app }} build
        env:
          # NEXT_PUBLIC_* 는 빌드 시점 인라인. CI 검증용 더미 값.
          # 실제 배포 빌드는 별도 워크플로에서 도메인 박아서 빌드 예정.
          NEXT_PUBLIC_API_URL: https://example.com/api
          NEXT_PUBLIC_KAKAO_MAP_KEY: ci_dummy_key

  # ────────────────────────────────────────────────────────────
  # 3) Docker build: Dockerfile 이 깨졌는지만 확인 (push X)
  # ────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build (${{ matrix.app }})
    runs-on: ubuntu-latest
    needs: [lint, build]
    strategy:
      fail-fast: false
      matrix:
        app: [api, web]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build api image
        if: matrix.app == 'api'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: false
          load: false
          tags: pangchelin-api:ci-${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build web image
        if: matrix.app == 'web'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: false
          load: false
          tags: pangchelin-web:ci-${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=https://example.com/api
            NEXT_PUBLIC_KAKAO_MAP_KEY=ci_dummy_key
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  # ────────────────────────────────────────────────────────────
  # 4) (선택) PR 요약 코멘트나 status check 집계 자리
  # ────────────────────────────────────────────────────────────
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [lint, build, docker-build]
    if: always()
    steps:
      - name: Verify all jobs passed
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.build.result }}" != "success" ]] || \
             [[ "${{ needs.docker-build.result }}" != "success" ]]; then
            echo "❌ One or more jobs failed"
            exit 1
          fi
          echo "✅ All CI jobs passed"
